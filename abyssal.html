];

function getBiomeAt(x,z){
  const d=Math.sqrt(x*x+z*z);
  const a=Math.atan2(z,x);
  if(d<600) return BIOMES[0];
  if(d<1200){const s=((a+Math.PI)/(Math.PI*2)*4)|0;return BIOMES[[1,2,3,1][s]]}
  if(d<2000){const s=((a+Math.PI)/(Math.PI*2)*4)|0;return BIOMES[[4,5,6,3][s]]}
  if(d<3000){const s=((a+Math.PI)/(Math.PI*2)*3)|0;return BIOMES[[7,6,5][s]]}
  if(d<4000) return BIOMES[8];
  return BIOMES[9];
}

function terrainY(x,z){
  const b=getBiomeAt(x,z);
  const d=Math.sqrt(x*x+z*z);
  const n=Math.sin(x*0.005)*15+Math.cos(z*0.007)*12+Math.sin((x+z)*0.003)*8+Math.sin(x*0.02)*3+Math.cos(z*0.015)*4;
  const base=-(b.depth[0]+(b.depth[1]-b.depth[0])*Math.min(d/4000,1));
  return base+n;
}

function countItem(id){return P.inventory.filter(i=>i.id===id).reduce((s,i)=>s+i.count,0)}
function addItem(id,n=1){const e=P.inventory.find(i=>i.id===id);if(e){e.count+=n;return}const r=RES[id];if(r)P.inventory.push({id,name:r.name,icon:r.icon,count:n})}
function removeItem(id,n=1){const i=P.inventory.findIndex(x=>x.id===id);if(i<0)return;P.inventory[i].count-=n;if(P.inventory[i].count<=0)P.inventory.splice(i,1)}
function canCraft(r){for(const[id,n]of Object.entries(r.req))if(countItem(id)<n)return false;return true}
function craft(r){if(!canCraft(r))return false;for(const[id,n]of Object.entries(r.req))removeItem(id,n);addItem(r.id);notify('Crafted '+r.name);return true}

let actx;
function initAudio(){actx=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,dur=0.1,vol=0.08,type='sine'){
  if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function playAmbient(){
  if(!actx)return;
  const loop=()=>{if(!running)return;const d=P.depth;tone(Math.max(20,42-d*0.02),3+Math.random()*3,0.02+d/2000*0.03);
  if(Math.random()<0.3)tone(80+Math.random()*180,1.5,0.01);
  if(d>200&&Math.random()<0.15)tone(28+Math.random()*12,3.5,0.035,'sawtooth');
  setTimeout(loop,3500+Math.random()*4500)};setTimeout(loop,1500);
}

// ─── TERRAIN ───────────────────────────────────────────
const terrainChunks=new Map();
const CHUNK=80,CHUNKRES=20;

function chunkKey(cx,cz){return cx+','+cz}

function buildChunk(cx,cz){
  const k=chunkKey(cx,cz);
  if(terrainChunks.has(k))return;
  const geo=new THREE.PlaneGeometry(CHUNK,CHUNK,CHUNKRES,CHUNKRES);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  const ox=cx*CHUNK,oz=cz*CHUNK;
  const biome=getBiomeAt(ox,oz);
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i)+ox, z=pos.getZ(i)+oz;
    pos.setY(i,terrainY(x,z));
  }
  geo.computeVertexNormals();
  const bc=biome.fog.clone().multiplyScalar(1.5);
  const mat=new THREE.MeshStandardMaterial({color:bc,roughness:0.85,metalness:0.1,flatShading:true});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(ox,0,oz);
  mesh.receiveShadow=true;
  scene.add(mesh);
  terrainChunks.set(k,mesh);
}

function buildTerrain(){
  updateChunks();
}

function updateChunks(){
  const px=camera.position.x,pz=camera.position.z;
  const VIEW=6;
  const ccx=Math.round(px/CHUNK),ccz=Math.round(pz/CHUNK);
  for(let x=ccx-VIEW;x<=ccx+VIEW;x++){
    for(let z=ccz-VIEW;z<=ccz+VIEW;z++){
      buildChunk(x,z);
    }
  }
  // Remove far chunks
  for(const[k,m]of terrainChunks){
    const[cx,cz]=k.split(',').map(Number);
    if(Math.abs(cx-ccx)>VIEW+2||Math.abs(cz-ccz)>VIEW+2){
      scene.remove(m);m.geometry.dispose();m.material.dispose();
      terrainChunks.delete(k);
    }
  }
}

// ─── WORLD POPULATION ──────────────────────────────────
function populateWorld(){
  const rng=s=>{s=Math.sin(s*127.1+311.7)*43758.5453;return s-Math.floor(s)};

  // Resources
  for(let i=0;i<400;i++){
    const a=rng(i)*Math.PI*2,d=rng(i+999)*4500;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const b=getBiomeAt(x,z);
    const resTypes={
      safe_shoals:['titanium','copper','quartz','coral_sample'],
      kelp_forest:['titanium','copper','silver','vine_sample'],
      red_reefs:['gold','lithium','ruby_coral'],
      mushroom_forest:['nickel','lithium','fungal_sample'],
      jelly_caves:['lithium','gold','jelly_sample'],
      blood_trench:['kyanite','uranium','blood_oil'],
      crystal_canyons:['kyanite','crystal_core','quartz'],
      thermal_depths:['uranium','kyanite','thermal_crystal'],
      void_edge:['crystal_core','alien_biomass'],
      abyss_core:['alien_biomass'],
    };
    const types=resTypes[b.id]||['titanium'];
    const rid=types[Math.floor(rng(i+500)*types.length)];
    if(!RES[rid])continue;
    const y=terrainY(x,z)+1;
    // 3D object
    const geo=new THREE.IcosahedronGeometry(0.5+rng(i+200)*0.4,0);
    const col=b.fog.clone().multiplyScalar(2).add(new THREE.Color(0x666666));
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.4,metalness:0.6,emissive:col,emissiveIntensity:0.15});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
    worldResources.push({id:rid,...RES[rid],x,y,z,mesh,collected:false,respawn:0});
  }

  // Creatures
  for(let i=0;i<200;i++){
    const a=rng(i+1000)*Math.PI*2,d=rng(i+2000)*4500;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const b=getBiomeAt(x,z);
    const valid=CREATURES.filter(c=>c.biomes.includes(b.id));
    if(!valid.length)continue;
    const type=valid[Math.floor(rng(i+3000)*valid.length)];
    spawnCreature(type,x,z);
  }

  // Leviathans
  for(const lev of LEVIATHANS){
    const count=lev.id==='ancient_king'?1:2;
    for(let i=0;i<count;i++){
      let x,z,tries=0;
      do{const a=Math.random()*Math.PI*2,d=1000+Math.random()*3500;x=Math.cos(a)*d;z=Math.sin(a)*d;tries++}
      while(!lev.biomes.includes(getBiomeAt(x,z).id)&&tries<50);
      spawnCreature(lev,x,z,true);
    }
  }

  // Wrecks
  const wpos=[[400,300],[800,-500],[-600,700],[1200,1000],[-1500,800],[2000,-1500],[-2500,2000],[3000,1000]];
  for(const[wx,wz]of wpos){
    const y=terrainY(wx,wz)+3;
    const geo=new THREE.BoxGeometry(8,4,5);
    const mat=new THREE.MeshStandardMaterial({color:0x445566,roughness:0.9,metalness:0.3});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(wx,y,wz);
    mesh.rotation.set(0.1,Math.random()*2,0.15);
    scene.add(mesh);
    // Accent
    const g2=new THREE.BoxGeometry(2,5,4);
    const m2=new THREE.MeshStandardMaterial({color:0x334455,roughness:0.8});
    const a2=new THREE.Mesh(g2,m2);
    a2.position.set(wx-4,y+1,wz);scene.add(a2);
    worldWrecks.push({x:wx,z:wz,y,mesh,explored:false});
  }

  // Starter base
  const baseY=terrainY(50,50)+4;
  const bg=new THREE.BoxGeometry(12,5,12);
  const bm=new THREE.MeshStandardMaterial({color:0x1a3a4a,roughness:0.6,metalness:0.2,transparent:true,opacity:0.85});
  const baseMesh=new THREE.Mesh(bg,bm);
  baseMesh.position.set(50,baseY,50);
  scene.add(baseMesh);
  // Glass windows
  const wg=new THREE.BoxGeometry(10,3,10);
  const wm=new THREE.MeshStandardMaterial({color:0x66ccdd,transparent:true,opacity:0.15,roughness:0.1,metalness:0.5});
  const wMesh=new THREE.Mesh(wg,wm);
  wMesh.position.set(50,baseY,50);scene.add(wMesh);
  worldBases.push({x:50,z:50,y:baseY,type:'multi_room',size:12,mesh:baseMesh});

  // Biome decorations
  buildBiomeDecor();
}

function spawnCreature(type,x,z,isLev=false){
  const y=terrainY(x,z)+type.size*0.5+2;
  const group=new THREE.Group();
  const color=new THREE.Color(type.color);

  if(isLev){
    // Leviathan — segmented body
    const segments=10;
    const segLen=type.size/segments;
    for(let s=0;s<segments;s++){
      const radius=(1-s*0.06)*type.size*0.12;
      const sg=new THREE.SphereGeometry(radius,8,6);
      const sm=new THREE.MeshStandardMaterial({color,roughness:0.5,metalness:0.3,emissive:color,emissiveIntensity:0.2});
      const smesh=new THREE.Mesh(sg,sm);
      smesh.position.set(-s*segLen*0.8,0,0);
      group.add(smesh);
    }
    // Eyes
    const eyeG=new THREE.SphereGeometry(type.size*0.04,6,6);
    const eyeM=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:0.8});
    const e1=new THREE.Mesh(eyeG,eyeM);e1.position.set(type.size*0.08,type.size*0.06,type.size*0.04);group.add(e1);
    const e2=new THREE.Mesh(eyeG,eyeM);e2.position.set(type.size*0.08,type.size*0.06,-type.size*0.04);group.add(e2);
    // Glow
    const glowG=new THREE.SphereGeometry(type.size*0.6,8,8);
    const glowM=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.06});
    const glow=new THREE.Mesh(glowG,glowM);group.add(glow);
  } else {
    // Fish body
    const bodyLen=type.size*2;
    const bodyH=type.size*0.6;
    // Main body — elongated sphere
    const bg=new THREE.SphereGeometry(type.size,10,8);
    bg.scale(1.6,0.6,0.5);
    const bm=new THREE.MeshStandardMaterial({color,roughness:0.4,metalness:0.2,emissive:color,emissiveIntensity:0.1});
    const body=new THREE.Mesh(bg,bm);
    group.add(body);
    // Tail fin
    const tg=new THREE.ConeGeometry(type.size*0.5,type.size*0.8,4);
    const tm=new THREE.MeshStandardMaterial({color,roughness:0.5});
    const tail=new THREE.Mesh(tg,tm);
    tail.position.set(-type.size*1.2,0,0);
    tail.rotation.z=Math.PI/2;
    group.add(tail);
    // Dorsal fin
    const dg=new THREE.ConeGeometry(type.size*0.2,type.size*0.5,3);
    const dm=new THREE.MeshStandardMaterial({color:color.clone().multiplyScalar(0.8),roughness:0.5});
    const dorsal=new THREE.Mesh(dg,dm);
    dorsal.position.set(0,type.size*0.4,0);
    group.add(dorsal);
    // Eye
    const eg=new THREE.SphereGeometry(type.size*0.08,6,6);
    const em=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.3});
    const eye=new THREE.Mesh(eg,em);
    eye.position.set(type.size*0.8,type.size*0.1,type.size*0.2);
    group.add(eye);
    const eye2=eye.clone();eye2.position.z=-type.size*0.2;group.add(eye2);
  }

  group.position.set(x,y,z);
  scene.add(group);

  worldCreatures.push({
    ...type,x,y,z,group,isLeviathan:isLev,
    vx:(Math.random()-0.5)*type.speed*0.5,
    vy:0,
    vz:(Math.random()-0.5)*type.speed*0.5,
    tx:x+(Math.random()-0.5)*100,
    tz:z+(Math.random()-0.5)*100,
    hp:type.hp,maxHp:type.hp,
    alive:true,aggroT:0,wanderT:Math.random()*10,
    _lastAtk:0,
  });
}

// ─── BIOME DECORATIONS ─────────────────────────────────
function buildBiomeDecor(){
  const rng=i=>{let s=Math.sin(i*127.1+311.7)*43758.5453;return s-Math.floor(s)};

  // Safe Shoals — coral clusters
  for(let i=0;i<120;i++){
    const a=rng(i+7000)*Math.PI*2,d=rng(i+7100)*580;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z);
    const colors=[0xff7766,0xff9944,0xffcc44,0x66ccaa,0xff88aa,0xff6688,0xffaa66];
    const c=colors[i%colors.length];
    // Coral branch
    for(let b=0;b<2+Math.floor(rng(i+7200)*3);b++){
      const h=1+rng(i+b*100)*2;
      const cg=new THREE.CylinderGeometry(0.1,0.25,h,5);
      const cm=new THREE.MeshStandardMaterial({color:c,roughness:0.6,emissive:c,emissiveIntensity:0.08});
      const cmesh=new THREE.Mesh(cg,cm);
      cmesh.position.set(x+(b-1)*0.5,y+h/2,z+rng(i+b*200)*0.8);
      cmesh.rotation.set(rng(i+b*300)*0.3,0,rng(i+b*400)*0.3);
      scene.add(cmesh);
      // Top bulb
      const bg=new THREE.SphereGeometry(0.2+rng(i+b*500)*0.15,6,6);
      const bm2=new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.15});
      const bulb=new THREE.Mesh(bg,bm2);
      bulb.position.set(x+(b-1)*0.5,y+h+0.15,z+rng(i+b*200)*0.8);
      scene.add(bulb);
    }
  }

  // Kelp Forest — tall kelp strands
  for(let i=0;i<100;i++){
    const a=rng(i+8000)*Math.PI*2;
    const d=620+rng(i+8100)*560;
    const sector=((a+Math.PI)/(Math.PI*2)*4)|0;
    if(sector!==0&&sector!==3)continue; // kelp biome sectors
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z);
    const h=8+rng(i+8200)*12;
    // Stalk
    const kg=new THREE.CylinderGeometry(0.08,0.12,h,4);
    const km=new THREE.MeshStandardMaterial({color:0x1e6428,roughness:0.7});
    const kelp=new THREE.Mesh(kg,km);
    kelp.position.set(x,y+h/2,z);
    scene.add(kelp);
    // Leaves at intervals
    for(let l=0;l<4;l++){
      const ly=y+h*0.3+l*(h*0.15);
      const lg=new THREE.PlaneGeometry(1.5,0.4);
      const lm=new THREE.MeshStandardMaterial({color:0x287832,side:THREE.DoubleSide,roughness:0.6,transparent:true,opacity:0.7});
      const leaf=new THREE.Mesh(lg,lm);
      leaf.position.set(x+0.5,ly,z);
      leaf.rotation.set(0,rng(i+l)*Math.PI,0.3);
      scene.add(leaf);
    }
  }

  // Red Reefs — glowing red coral formations
  for(let i=0;i<60;i++){
    const a=rng(i+9000)*Math.PI*2;
    const d=620+rng(i+9100)*560;
    const sector=((a+Math.PI)/(Math.PI*2)*4)|0;
    if(sector!==1)continue;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z);
    const sg=new THREE.SphereGeometry(0.8+rng(i+9200)*1.5,8,6);
    const sm=new THREE.MeshStandardMaterial({color:0xcc2020,emissive:0xff3030,emissiveIntensity:0.25,roughness:0.5});
    const s=new THREE.Mesh(sg,sm);
    s.position.set(x,y+0.6,z);scene.add(s);
  }

  // Mushroom Forest — giant mushrooms
  for(let i=0;i<40;i++){
    const a=rng(i+10000)*Math.PI*2;
    const d=620+rng(i+10100)*560;
    const sector=((a+Math.PI)/(Math.PI*2)*4)|0;
    if(sector!==2)continue;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z);
    const h=4+rng(i+10200)*8;
    // Stem
    const stg=new THREE.CylinderGeometry(0.3,0.5,h,6);
    const stm=new THREE.MeshStandardMaterial({color:0x506440,roughness:0.7});
    const stem=new THREE.Mesh(stg,stm);
    stem.position.set(x,y+h/2,z);scene.add(stem);
    // Cap
    const cg=new THREE.SphereGeometry(1.5+rng(i+10300)*2,8,6,0,Math.PI*2,0,Math.PI/2);
    const cm=new THREE.MeshStandardMaterial({color:0x78a064,emissive:0x80ff80,emissiveIntensity:0.08,roughness:0.5});
    const cap=new THREE.Mesh(cg,cm);
    cap.position.set(x,y+h,z);cap.rotation.x=Math.PI;scene.add(cap);
  }

  // Crystal Canyons — crystal formations
  for(let i=0;i<50;i++){
    const a=rng(i+11000)*Math.PI*2;
    const d=1220+rng(i+11100)*760;
    const sector=((a+Math.PI)/(Math.PI*2)*4)|0;
    if(sector!==2)continue;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z);
    for(let c=0;c<2+Math.floor(rng(i+11200)*3);c++){
      const h=2+rng(i+c*100+11300)*5;
      const cg=new THREE.ConeGeometry(0.3+rng(i+c*200)*0.4,h,5);
      const cm=new THREE.MeshStandardMaterial({color:0x5060c0,emissive:0x8090ff,emissiveIntensity:0.3,roughness:0.2,metalness:0.5,transparent:true,opacity:0.7});
      const crystal=new THREE.Mesh(cg,cm);
      crystal.position.set(x+c*0.8-0.8,y+h/2,z+rng(i+c*300)*1.2);
      crystal.rotation.set(rng(i+c*400)*0.2,0,rng(i+c*500)*0.3);
      scene.add(crystal);
    }
  }

  // Jelly Caves — floating jellyfish-like objects
  for(let i=0;i<40;i++){
    const a=rng(i+12000)*Math.PI*2;
    const d=1220+rng(i+12100)*760;
    const sector=((a+Math.PI)/(Math.PI*2)*4)|0;
    if(sector!==0)continue;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z)+3+rng(i+12200)*8;
    const sg=new THREE.SphereGeometry(0.5+rng(i+12300)*0.8,8,6,0,Math.PI*2,0,Math.PI*0.6);
    const sm=new THREE.MeshStandardMaterial({color:0xb850dc,emissive:0xdd80ff,emissiveIntensity:0.35,transparent:true,opacity:0.5,roughness:0.3});
    const jelly=new THREE.Mesh(sg,sm);
    jelly.position.set(x,y,z);scene.add(jelly);
    // Tendrils
    for(let t=0;t<3;t++){
      const tg=new THREE.CylinderGeometry(0.02,0.02,2+rng(i+t)*2,3);
      const tm=new THREE.MeshStandardMaterial({color:0xcc66ff,transparent:true,opacity:0.3});
      const tendril=new THREE.Mesh(tg,tm);
      tendril.position.set(x+rng(i+t*100)*0.5-0.25,y-1.5,z+rng(i+t*200)*0.5-0.25);
      scene.add(tendril);
    }
  }

  // Thermal Depths — lava vents with glow
  for(let i=0;i<30;i++){
    const a=rng(i+13000)*Math.PI*2;
    const d=2020+rng(i+13100)*960;
    const sector=((a+Math.PI)/(Math.PI*2)*3)|0;
    if(sector!==0)continue;
    const x=Math.cos(a)*d,z=Math.sin(a)*d;
    const y=terrainY(x,z);
    const vg=new THREE.ConeGeometry(1,2.5,6);
    const vm=new THREE.MeshStandardMaterial({color:0x804020,emissive:0xff6020,emissiveIntensity:0.5,roughness:0.8});
    const vent=new THREE.Mesh(vg,vm);
    vent.position.set(x,y+1.2,z);scene.add(vent);
    // Glow
    const gg=new THREE.SphereGeometry(2,8,8);
    const gm=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.08});
    const gl=new THREE.Mesh(gg,gm);
    gl.position.set(x,y+2,z);scene.add(gl);
  }
}

// ─── PARTICLE SYSTEMS ──────────────────────────────────
let bubbleParticles, debrisParticles, godRays;

function createParticles(){
  // Bubbles
  const bCount=300;
  const bGeo=new THREE.BufferGeometry();
  const bPos=new Float32Array(bCount*3);
  for(let i=0;i<bCount;i++){
    bPos[i*3]=Math.random()*200-100;
    bPos[i*3+1]=Math.random()*60-30;
    bPos[i*3+2]=Math.random()*200-100;
  }
  bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
  const bMat=new THREE.PointsMaterial({color:0xaaddff,size:0.15,transparent:true,opacity:0.4});
  bubbleParticles=new THREE.Points(bGeo,bMat);
  scene.add(bubbleParticles);

  // Floating debris/sediment
  const dCount=500;
  const dGeo=new THREE.BufferGeometry();
  const dPos=new Float32Array(dCount*3);
  for(let i=0;i<dCount;i++){
    dPos[i*3]=Math.random()*300-150;
    dPos[i*3+1]=Math.random()*80-40;
    dPos[i*3+2]=Math.random()*300-150;
  }
  dGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
  const dMat=new THREE.PointsMaterial({color:0x88aacc,size:0.08,transparent:true,opacity:0.25});
  debrisParticles=new THREE.Points(dGeo,dMat);
  scene.add(debrisParticles);

  // God rays (vertical light shafts — only visible near surface)
  for(let i=0;i<6;i++){
    const rg=new THREE.CylinderGeometry(1+Math.random()*2,2+Math.random()*3,60,8,1,true);
    const rm=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:0.03,side:THREE.DoubleSide});
    const ray=new THREE.Mesh(rg,rm);
    ray.position.set(Math.random()*100-50,-20,Math.random()*100-50);
    ray.userData.isGodRay=true;
    scene.add(ray);
  }
}

// ─── SCANNING ──────────────────────────────────────────
let scanning={active:false,target:null,progress:0,dur:3};

// ─── UPDATE ────────────────────────────────────────────
function update(dt){
  if(paused||!running)return;
  gameTime+=dt;dayTime=(dayTime+dt)%DAY;

  // Movement
  const speed=P.swimSpeed*dt;
  const dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  const right=new THREE.Vector3().crossVectors(dir,camera.up).normalize();
  const move=new THREE.Vector3();
  if(keys['w'])move.add(dir);
  if(keys['s'])move.sub(dir);
  if(keys['a'])move.sub(right);
  if(keys['d'])move.add(right);
  if(keys[' '])move.y+=1;
  if(keys['shift'])move.y-=1;
  if(move.length()>0){
    move.normalize().multiplyScalar(speed);
    camera.position.add(move);
  }

  // Clamp to terrain
  const ty=terrainY(camera.position.x,camera.position.z)+1.5;
  if(camera.position.y<ty)camera.position.y=ty;
  if(camera.position.y>3)camera.position.y=3;

  // Depth
  P.depth=Math.max(0,-camera.position.y);

  // Biome fog
  const biome=getBiomeAt(camera.position.x,camera.position.z);
  const depthDarken=Math.max(0.05,1-P.depth/600);
  const targetFog=biome.fog.clone().multiplyScalar(depthDarken);
  scene.fog.color.lerp(targetFog,dt*2);
  scene.background=scene.fog.color.clone();
  scene.fog.density=0.008+P.depth*0.00003;

  // Ambient light adjustment
  const ambLight=scene.children.find(c=>c.isAmbientLight);
  if(ambLight)ambLight.intensity=Math.max(0.08,0.6*depthDarken);
  const dirLight=scene.children.find(c=>c.isDirectionalLight);
  if(dirLight)dirLight.intensity=Math.max(0.05,0.8*depthDarken);

  // Flashlight
  const pl=camera.children[0];
  if(pl&&pl.isPointLight){
    const hasTorch=P.hotbar[P.activeSlot]?.id==='flashlight';
    pl.intensity=hasTorch?2:0.3;
    pl.distance=hasTorch?50:20;
  }

  // Survival
  P.o2-=dt*0.7*(P.depth>100?1.4:1);
  P.food-=dt*0.12;
  P.water-=dt*0.16;
  if(P.depth<3)P.o2=Math.min(P.maxO2,P.o2+dt*20);
  // Near base = O2
  for(const b of worldBases){
    const dx=camera.position.x-b.x,dz=camera.position.z-b.z;
    if(Math.sqrt(dx*dx+dz*dz)<b.size)P.o2=Math.min(P.maxO2,P.o2+dt*15);
  }
  if(P.o2<=0){P.hp-=dt*8;P.o2=0}
  if(P.food<=0){P.hp-=dt*2;P.food=0}
  if(P.water<=0){P.hp-=dt*4;P.water=0}
  if(P.depth>P.maxDepthSafe)P.hp-=dt*4*(P.depth-P.maxDepthSafe)/100;
  if(P.hp<=0)die();

  // Pressure warning
  document.getElementById('pressure-warn').style.opacity=P.depth>P.maxDepthSafe?0.3+Math.sin(gameTime*4)*0.15:0;

  // Story triggers
  const pdist=Math.sqrt(camera.position.x**2+camera.position.z**2);
  if(P.storyProg===0&&gameTime>3)playStory(0);
  if(P.storyProg===1&&pdist>1200)playStory(1);
  if(P.storyProg===2&&pdist>2500)playStory(2);
  if(P.storyProg===3&&pdist>3800)playStory(3);

  // Log discovery
  for(const l of LOGS){
    if(!P.logsFound.includes(l.id)&&pdist>=l.dist){
      P.logsFound.push(l.id);
      notify('New log: '+l.title);
      tone(400,0.3,0.04);setTimeout(()=>tone(600,0.25,0.03),200);
    }
  }

  // Infection
  if(P.depth>200&&!P.hasInfection&&P.storyProg>=2){P.hasInfection=true;notify('⚠ Foreign bacteria detected in bloodstream')}
  if(P.hasInfection)P.infLvl=Math.min(100,P.infLvl+dt*0.01);

  // Creature AI
  const pp=camera.position;
  for(const c of worldCreatures){
    if(!c.alive)continue;
    const dx=pp.x-c.x,dz=pp.z-c.z,dy=pp.y-c.y;
    const pd=Math.sqrt(dx*dx+dy*dy+dz*dz);
    const aggroR=c.isLeviathan?120:40;

    c.wanderT-=dt;
    if(c.wanderT<=0){
      c.wanderT=5+Math.random()*10;
      c.tx=c.x+(Math.random()-0.5)*80;
      c.tz=c.z+(Math.random()-0.5)*80;
    }

    if(c.aggroT>0)c.aggroT-=dt;
    if((c.behavior==='aggressive'||c.isLeviathan)&&pd<aggroR){c.tx=pp.x;c.tz=pp.z;c.aggroT=8}
    if(c.behavior==='passive'&&pd<15){c.tx=c.x-dx*3;c.tz=c.z-dz*3}
    if(c.behavior==='territorial'&&pd<25){c.tx=pp.x;c.tz=pp.z;c.aggroT=6}

    const ttx=c.tx-c.x,ttz=c.tz-c.z;
    const tl=Math.sqrt(ttx*ttx+ttz*ttz);
    if(tl>1){
      const spd=(c.aggroT>0?c.speed*1.3:c.speed)*dt;
      c.vx+=(ttx/tl*spd-c.vx)*0.05;
      c.vz+=(ttz/tl*spd-c.vz)*0.05;
    }
    c.x+=c.vx;c.z+=c.vz;
    const ty2=terrainY(c.x,c.z)+c.size*0.5+1;
    c.y+=(ty2-c.y)*0.02;
    c.vx*=0.98;c.vz*=0.98;

    // Update mesh
    c.group.position.set(c.x,c.y,c.z);
    const ang=Math.atan2(c.vz,c.vx);
    c.group.rotation.y=-ang+Math.PI/2;
    // Tail/body animation
    if(c.isLeviathan){
      c.group.children.forEach((seg,i)=>{
        if(i>0&&i<10)seg.position.y=Math.sin(gameTime*2+i*0.5)*c.size*0.02;
      });
    }

    // Attack
    if(c.damage&&pd<c.size+3&&c.aggroT>0){
      if(gameTime-c._lastAtk>1.5){
        c._lastAtk=gameTime;
        P.hp-=c.damage;
        tone(100,0.2,0.12,'sawtooth');tone(80,0.3,0.08,'square');
        notify(`${c.name} attacks! -${c.damage} HP`);
        if(c.isLeviathan){
          const kb=3;
          camera.position.x-=dx/pd*kb;
          camera.position.z-=dz/pd*kb;
        }
      }
    }
  }

  // Scanning
  if(scanning.active&&scanning.target){
    scanning.progress+=dt;
    if(scanning.progress>=scanning.dur){
      scanning.active=false;
      if(scanning.isWreck){
        const w=scanning.target;
        if(!w.explored){
          w.explored=true;
          addItem('titanium',3);addItem('copper',2);
          const unlocks=['battery','wiring','glass','silicone','fiber_mesh','computer_chip','habitat_builder'];
          const u=unlocks[Math.floor(Math.random()*unlocks.length)];
          P.blueprints.add(u);
          notify(`Wreck scanned! Blueprint: ${u}`);
        }
      } else {
        const t=scanning.target;
        if(!P.scanned.has(t.id)){P.scanned.add(t.id);notify('Scanned: '+t.name);tone(800,0.3,0.04)}
      }
    }
  }

  // Particles follow camera
  if(bubbleParticles){
    const bp=bubbleParticles.geometry.attributes.position;
    for(let i=0;i<bp.count;i++){
      bp.array[i*3+1]+=dt*0.5;
      if(bp.array[i*3+1]>pp.y+30){
        bp.array[i*3]=pp.x+Math.random()*100-50;
        bp.array[i*3+1]=pp.y-30;
        bp.array[i*3+2]=pp.z+Math.random()*100-50;
      }
    }
    bp.needsUpdate=true;
    bubbleParticles.material.opacity=Math.max(0.05,0.4*depthDarken);
  }
  if(debrisParticles){
    debrisParticles.position.set(pp.x,pp.y,pp.z);
    debrisParticles.material.opacity=0.15+P.depth*0.0003;
  }

  // God rays visibility
  scene.traverse(c=>{
    if(c.userData.isGodRay){
      c.material.opacity=P.depth<80?0.03*(1-P.depth/80):0;
      c.position.x=pp.x+c.position.x*0.01;
      c.position.z=pp.z+c.position.z*0.01;
    }
  });

  // Resource respawn
  for(const r of worldResources){
    if(r.collected){
      r.respawn-=dt;
      if(r.respawn<=0){r.collected=false;r.mesh.visible=true}
    }
  }

  // Notification timer
  if(notifT>0){notifT-=dt;if(notifT<=0)document.getElementById('notify').style.opacity='0'}

  // Chunks
  if(Math.floor(gameTime*2)%2===0)updateChunks();

  // HUD
  updateHUD(biome,pdist);
}

// ─── HUD ───────────────────────────────────────────────
function updateHUD(biome,pdist){
  document.getElementById('hp-bar').style.width=Math.max(0,P.hp/P.maxHp*100)+'%';
  document.getElementById('o2-bar').style.width=Math.max(0,P.o2/P.maxO2*100)+'%';
  document.getElementById('food-bar').style.width=Math.max(0,P.food)+'%';
  document.getElementById('water-bar').style.width=Math.max(0,P.water)+'%';
  if(P.hp<30)document.getElementById('hp-bar').style.background='linear-gradient(90deg,#ff0000,#ff3333)';
  else document.getElementById('hp-bar').style.background='linear-gradient(90deg,#e04040,#f06060)';
  if(P.o2<25)document.getElementById('o2-bar').style.background='linear-gradient(90deg,#ff3333,#ff5555)';
  else document.getElementById('o2-bar').style.background='linear-gradient(90deg,#40a0f0,#60c0ff)';

  if(biome)document.getElementById('compass').textContent=`${biome.name}  ·  ${Math.floor(P.depth)}m`;
  document.getElementById('depth-info').textContent=Math.floor(P.depth)+'m';

  // Hotbar
  const hb=document.getElementById('hotbar');
  hb.innerHTML=P.hotbar.map((item,i)=>
    `<div class="hslot ${i===P.activeSlot?'act':''}"><div class="hkey">${i+1}</div>${item?`<div style="font-size:16px">${item.icon}</div><div style="font-size:8px">${item.name}</div>`:''}</div>`
  ).join('');

  // Interaction
  const rc=new THREE.Raycaster();
  rc.setFromCamera(new THREE.Vector2(0,0),camera);
  const interEl=document.getElementById('interact');
  let interText='';
  // Check resources
  for(const r of worldResources){
    if(r.collected)continue;
    const d=camera.position.distanceTo(new THREE.Vector3(r.x,r.y,r.z));
    if(d<8){interText=`[Click] Pick up ${r.name}`;break}
  }
  if(!interText){
    for(const c of worldCreatures){
      if(!c.alive)continue;
      const d=camera.position.distanceTo(new THREE.Vector3(c.x,c.y,c.z));
      if(d<(c.isLeviathan?30:10)){
        const tool=P.hotbar[P.activeSlot];
        if(tool?.id==='scanner')interText=`[Hold Click] Scan ${c.name}`;
        else if(tool?.id==='knife')interText=`[Click] Attack ${c.name}`;
        else interText=c.name+(c.isLeviathan?' [LEVIATHAN]':'');
        break;
      }
    }
  }
  if(!interText){
    for(const w of worldWrecks){
      const d=camera.position.distanceTo(new THREE.Vector3(w.x,w.y,w.z));
      if(d<15){interText=w.explored?'Explored Wreckage':'[Scanner + Click] Scan Wreckage';break}
    }
  }
  if(interText){interEl.textContent=interText;interEl.style.display='block'}
  else interEl.style.display='none';

  // Minimap
  renderMinimap();

  // Scanner overlay
  if(scanning.active){
    const prog=scanning.progress/scanning.dur;
    document.getElementById('interact').textContent=`SCANNING... ${Math.floor(prog*100)}%`;
    document.getElementById('interact').style.display='block';
  }
}

function renderMinimap(){
  const mx=MX||document.getElementById('mmc').getContext('2d');
  mx.fillStyle='rgba(0,18,28,0.85)';mx.fillRect(0,0,130,130);
  const scale=0.018;
  for(let y=0;y<130;y+=5){
    for(let x=0;x<130;x+=5){
      const wx=camera.position.x+(x-65)/scale;
      const wz=camera.position.z+(y-65)/scale;
      const b=getBiomeAt(wx,wz);
      mx.fillStyle=`rgb(${Math.floor(b.fog.r*180)},${Math.floor(b.fog.g*180)},${Math.floor(b.fog.b*180)})`;
      mx.fillRect(x,y,5,5);
    }
  }
  for(const b of worldBeacons){
    const bx=65+(b.x-camera.position.x)*scale;
    const by=65+(b.z-camera.position.z)*scale;
    if(bx>3&&bx<127&&by>3&&by<127){
      mx.fillStyle='#'+new THREE.Color(b.color).getHexString();
      mx.fillRect(bx-1,by-1,3,3);
    }
  }
  mx.fillStyle='#7fdbca';mx.beginPath();mx.arc(65,65,3,0,Math.PI*2);mx.fill();
  const dir=new THREE.Vector3();camera.getWorldDirection(dir);
  mx.strokeStyle='#7fdbca';mx.lineWidth=1;mx.beginPath();mx.moveTo(65,65);
  mx.lineTo(65+dir.x*10,65+dir.z*10);mx.stroke();
}
const MX=document.getElementById('mmc').getContext('2d');

// ─── CLICK HANDLER ─────────────────────────────────────
function handleClick(){
  if(showPDA||showInv)return;
  const tool=P.hotbar[P.activeSlot];
  const pp=camera.position;
  const lookDir=new THREE.Vector3();camera.getWorldDirection(lookDir);

  // Resources
  for(const r of worldResources){
    if(r.collected)continue;
    const d=pp.distanceTo(new THREE.Vector3(r.x,r.y,r.z));
    if(d<8){
      r.collected=true;r.respawn=120;r.mesh.visible=false;
      addItem(r.id);tone(600,0.08,0.06);setTimeout(()=>tone(900,0.08,0.05),80);
      notify('Picked up '+r.name);return;
    }
  }

  // Knife attack
  if(tool?.id==='knife'){
    for(const c of worldCreatures){
      if(!c.alive)continue;
      const d=pp.distanceTo(new THREE.Vector3(c.x,c.y,c.z));
      if(d<(c.isLeviathan?20:6)){
        c.hp-=20;tone(200,0.1,0.08,'sawtooth');
        if(c.hp<=0){
          c.alive=false;c.group.visible=false;
          if(c.drops)c.drops.forEach(dr=>addItem(dr));
          notify('Killed '+c.name);
        }
        c.aggroT=10;return;
      }
    }
  }

  // Scanner
  if(tool?.id==='scanner'){
    for(const c of worldCreatures){
      if(!c.alive)continue;
      const d=pp.distanceTo(new THREE.Vector3(c.x,c.y,c.z));
      if(d<(c.isLeviathan?40:12)){
        scanning={active:true,target:c,progress:0,dur:3};tone(800,0.3,0.04);return;
      }
    }
    for(const w of worldWrecks){
      const d=pp.distanceTo(new THREE.Vector3(w.x,w.y,w.z));
      if(d<15){scanning={active:true,target:w,progress:0,dur:2,isWreck:true};tone(800,0.3,0.04);return}
    }
  }

  // Build placement
  if(buildPlacing){
    const piece=BUILD_PIECES.find(b=>b.id===buildPlacing);
    if(piece&&canCraft({req:piece.req})){
      for(const[id,n]of Object.entries(piece.req))removeItem(id,n);
      const bx=pp.x+lookDir.x*8,bz=pp.z+lookDir.z*8;
      const by=terrainY(bx,bz)+3;
      const bg=new THREE.BoxGeometry(6,3,6);
      const bm=new THREE.MeshStandardMaterial({color:0x1a3a4a,roughness:0.6,metalness:0.2,transparent:true,opacity:0.85});
      const mesh=new THREE.Mesh(bg,bm);
      mesh.position.set(bx,by,bz);scene.add(mesh);
      worldBases.push({x:bx,z:bz,y:by,type:piece.id,size:6,mesh});
      if(piece.id==='beacon')worldBeacons.push({x:bx,z:bz,name:'Beacon',color:0xffaa44});
      tone(300,0.15,0.06,'triangle');setTimeout(()=>tone(450,0.12,0.05,'triangle'),120);
      notify('Built '+piece.name);
    } else notify('Missing materials');
    buildPlacing=null;return;
  }
}

// ─── INPUT ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key>='1'&&e.key<='8')P.activeSlot=parseInt(e.key)-1;
  if(e.key.toLowerCase()==='e')toggleInv();
  if(e.key==='Tab'){e.preventDefault();togglePDA()}
  if(e.key.toLowerCase()==='q')toggleBuild();
  if(e.key==='Escape'){
    if(showPDA)closePDA();
    else if(showInv)closeInv();
    else if(showBuild)closeBuild();
  }
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
document.addEventListener('mousedown',e=>{
  if(!controls.isLocked){
    if(running)controls.lock();
    return;
  }
  handleClick();
});

// ─── UI TOGGLES ────────────────────────────────────────
function togglePDA(){showPDA=!showPDA;document.getElementById('pda').style.display=showPDA?'block':'none';if(showPDA){controls.unlock();renderPDA()}else controls.lock();paused=showPDA||showInv}
function closePDA(){showPDA=false;document.getElementById('pda').style.display='none';if(!showInv)controls.lock();paused=showInv}
function toggleInv(){showInv=!showInv;document.getElementById('inv').style.display=showInv?'flex':'none';document.getElementById('craft').style.display=showInv?'block':'none';if(showInv){controls.unlock();renderInv();renderCraft()}else controls.lock();paused=showPDA||showInv}
function closeInv(){showInv=false;document.getElementById('inv').style.display='none';document.getElementById('craft').style.display='none';if(!showPDA)controls.lock();paused=showPDA}
function toggleBuild(){showBuild=!showBuild;document.getElementById('buildmenu').style.display=showBuild?'block':'none';if(showBuild)renderBuildMenu()}
function closeBuild(){showBuild=false;document.getElementById('buildmenu').style.display='none';buildPlacing=null}

// ─── PDA ───────────────────────────────────────────────
function renderPDA(tab='logs'){
  document.getElementById('pda-tabs').innerHTML=['logs','encyclopedia','story'].map(t=>
    `<div class="ptab ${t===tab?'act':''}" onclick="window._renderPDA('${t}')">${t.toUpperCase()}</div>`
  ).join('');
  const body=document.getElementById('pda-body');
  if(tab==='logs'){
    const found=LOGS.filter(l=>P.logsFound.includes(l.id));
    body.innerHTML=found.length?found.map(l=>`<div class="lentry" onclick="window._showLog('${l.id}')"><h4>[${l.from}] ${l.title}</h4><p>Act ${l.act}</p></div>`).join(''):'<p style="opacity:0.4">No logs yet. Explore to discover data entries.</p>';
  } else if(tab==='encyclopedia'){
    const list=[...P.scanned];
    body.innerHTML=list.length?list.map(id=>{
      const c=CREATURES.find(t=>t.id===id)||LEVIATHANS.find(t=>t.id===id);
      if(!c)return '';
      return `<div class="lentry"><h4>${c.name} ${c.size>10?'[LEVIATHAN]':''}</h4><p style="opacity:0.8;line-height:1.6">${c.desc}</p><p style="opacity:0.4;font-size:10px">Size: ${c.size}m | HP: ${c.hp}</p></div>`;
    }).join(''):'<p style="opacity:0.4">No organisms scanned. Use Scanner tool.</p>';
  } else if(tab==='story'){
    const acts=['Act 1: Survival','Act 2: Discovery','Act 3: The Infection','Act 4: The Deep','Act 5: Endgame'];
    body.innerHTML=acts.map((a,i)=>{
      const u=P.storyProg>=i;
      return `<div class="lentry" style="opacity:${u?1:0.25}"><h4>${a}</h4><p>${u?['Survive the crash. Build shelter.','Discover alien ruins. Find expedition logs.','Learn of the infection. Search for the cure.','Reach the Abyss Core. Face the Ancient King.','Choose your ending.'][i]:'???'}</p></div>`;
    }).join('');
  }
}
window._renderPDA=tab=>renderPDA(tab);
window._showLog=id=>{
  const l=LOGS.find(x=>x.id===id);if(!l)return;
  document.getElementById('pda-body').innerHTML=`<div style="padding:15px"><h3 style="margin-bottom:12px">${l.title}</h3><p style="font-size:10px;opacity:0.4;margin-bottom:12px">[${l.from}]</p><p style="line-height:2;opacity:0.8">${l.text}</p><br><div class="ptab" onclick="window._renderPDA('logs')" style="display:inline-block">← BACK</div></div>`;
};

// ─── INVENTORY ─────────────────────────────────────────
function renderInv(){
  const grid=document.getElementById('inv-grid');
  grid.innerHTML='';
  for(let i=0;i<30;i++){
    const item=P.inventory[i];
    const s=document.createElement('div');s.className='islot';
    if(item){
      s.innerHTML=`<div class="iicon">${item.icon}</div><div style="font-size:8px">${item.name}</div>${item.count>1?`<div class="icnt">x${item.count}</div>`:''}`;
      s.onclick=()=>{
        if(item.id==='cooked_fish'||item.id==='raw_fish'){removeItem(item.id);P.food=Math.min(100,P.food+(item.id==='cooked_fish'?30:12));notify('Ate '+item.name);renderInv()}
        else if(item.id==='filtered_water'){removeItem(item.id);P.water=Math.min(100,P.water+28);notify('Drank water');renderInv()}
        else{const es=P.hotbar.findIndex(h=>!h);const si=es>=0?es:P.activeSlot;P.hotbar[si]={id:item.id,name:item.name,icon:item.icon};notify('Equipped '+item.name)}
      };
    }
    grid.appendChild(s);
  }
}

function renderCraft(){
  const panel=document.getElementById('craft');
  const cats=['survival','component','tool','equip'];
  panel.innerHTML='<div style="font-size:13px;margin-bottom:12px;letter-spacing:2px">FABRICATOR</div>'+
    cats.map(cat=>{
      const items=RECIPES.filter(r=>r.cat===cat&&P.blueprints.has(r.id));
      if(!items.length)return '';
      return `<div style="font-size:9px;opacity:0.4;margin:8px 0 4px;letter-spacing:2px">${cat.toUpperCase()}</div>`+
        [...new Map(items.map(r=>[r.id,r])).values()].map(r=>{
          const can2=canCraft(r);
          return `<div class="citem ${can2?'can':'cant'}" onclick="window._craft('${r.id}')"><div class="cname">${r.icon} ${r.name}</div><div class="creq">${Object.entries(r.req).map(([id,n])=>`${RES[id]?.name||id}: ${countItem(id)}/${n}`).join(' · ')}</div></div>`;
        }).join('');
    }).join('');
}
window._craft=id=>{
  const r=RECIPES.find(x=>x.id===id);
  if(r&&craft(r)){
    tone(500,0.1,0.05);setTimeout(()=>tone(700,0.1,0.04),100);setTimeout(()=>tone(1000,0.12,0.05),200);
    renderInv();renderCraft();
    if(id==='battery')['wiring','flashlight','scanner'].forEach(x=>P.blueprints.add(x));
    if(id==='wiring')['computer_chip','repair_tool','rebreather','habitat_builder'].forEach(x=>P.blueprints.add(x));
    if(id==='computer_chip')['depth_module_1'].forEach(x=>P.blueprints.add(x));
    if(id==='glass')['enameled_glass','high_tank'].forEach(x=>P.blueprints.add(x));
    if(id==='fins')P.swimSpeed=11;
    if(id==='basic_tank')P.maxO2=130;
    if(id==='high_tank')P.maxO2=180;
    if(id==='rebreather')P.maxO2=200;
    if(id==='reinforced_suit')P.maxDepthSafe=300;
    if(id==='depth_module_1')P.maxDepthSafe=500;
  }
};

// ─── BUILD MENU ────────────────────────────────────────
function renderBuildMenu(){
  document.getElementById('bgrid').innerHTML=BUILD_PIECES.map(p=>{
    const can2=canCraft({req:p.req});
    return `<div class="bitem" style="opacity:${can2?1:0.35}" onclick="window._build('${p.id}')"><div class="bicon">${p.icon}</div>${p.name}</div>`;
  }).join('');
}
window._build=id=>{buildPlacing=id;closeBuild();notify('Click to place')};

// ─── STORY ─────────────────────────────────────────────
function playStory(act){
  if(act>=STORIES.length)return;
  const seq=STORIES[act];let idx=0;
  const overlay=document.getElementById('story');
  const text=document.getElementById('story-text');
  overlay.style.display='block';paused=true;controls.unlock();
  const show=()=>{
    if(idx>=seq.length){overlay.style.display='none';paused=false;P.storyProg=act+1;controls.lock();return}
    text.style.opacity='0';
    setTimeout(()=>{text.textContent=seq[idx];text.style.opacity='1'},300);
    idx++;
  };
  show();overlay.onclick=show;
}

// ─── DEATH ─────────────────────────────────────────────
function die(){running=false;controls.unlock();document.getElementById('death').style.display='flex'}
document.getElementById('respawn-btn').onclick=()=>{
  P.hp=P.maxHp;P.o2=P.maxO2;P.food=70;P.water=70;
  camera.position.set(0,-5,0);
  document.getElementById('death').style.display='none';
  running=true;controls.lock();
};

// ─── GAME LOOP ─────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(!running)return;
  const dt=Math.min(clock.getDelta(),0.05);
  update(dt);
  renderer.render(scene,camera);
}

// ─── START ─────────────────────────────────────────────
document.getElementById('play-btn').onclick=()=>{
  document.getElementById('title').style.display='none';
  initAudio();
  initThree();
  running=true;
  clock.start();
  controls.lock();
  playAmbient();
  loop();
};

// Title screen animation
(function titleLoop(){
  if(document.getElementById('title').style.display==='none')return;
  requestAnimationFrame(titleLoop);
})();
</script>
